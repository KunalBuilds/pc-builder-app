<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#adc6ff",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e3e2e7",
                        "surface-container": "#eeedf3",
                        "on-primary-fixed-variant": "#004493",
                        "surface-dim": "#dad9df",
                        "tertiary": "#9e3d00",
                        "tertiary-fixed": "#ffdbcc",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed-dim": "#adc6ff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#3631b4",
                        "surface-container-high": "#e9e7ed",
                        "background": "#faf9fe",
                        "primary": "#0058bc",
                        "on-tertiary-fixed": "#351000",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f1f0f5",
                        "surface-container-low": "#f4f3f8",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#c64f00",
                        "secondary": "#4c4aca",
                        "surface-container-highest": "#e3e2e7",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "surface-bright": "#faf9fe",
                        "on-primary-fixed": "#001a41",
                        "on-surface": "#1a1b1f",
                        "tertiary-fixed-dim": "#ffb595",
                        "on-secondary-container": "#fffbff",
                        "surface": "#faf9fe",
                        "on-secondary-fixed": "#0c006a",
                        "secondary-fixed": "#e2dfff",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#6664e4",
                        "on-error": "#ffffff",
                        "outline-variant": "#c1c6d7",
                        "on-background": "#1a1b1f",
                        "on-error-container": "#93000a",
                        "outline": "#717786",
                        "inverse-surface": "#2f3034",
                        "primary-container": "#0070eb",
                        "secondary-fixed-dim": "#c2c1ff",
                        "on-primary-container": "#fefcff",
                        "surface-tint": "#005bc1",
                        "on-surface-variant": "#414755",
                        "primary-fixed": "#d8e2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .splash-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(216, 226, 255, 0.4) 0%, rgba(250, 249, 254, 1) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center splash-gradient">
<!-- Background Texture/Layering (Tonal Stacking) -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-secondary rounded-full blur-[100px]"></div>
</div>
<!-- Logo & Brand Content -->
<div class="z-10 flex flex-col items-center space-y-6">
<!-- PC Architect Logo (Iconic Representation) -->
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-[28px] bg-surface-container-lowest shadow-sm"></div>
<!-- Precision Icon -->
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'wght' 200, 'FILL' 0;">
                    architecture
                </span>
<!-- Subtle Accent -->
<div class="absolute top-1 right-1 w-2 h-2 rounded-full bg-tertiary"></div>
</div>
<!-- Brand Name (Using JSON Casing & Styles) -->
<div class="text-center space-y-1">
<h1 class="text-2xl font-black tracking-tighter text-blue-700 uppercase">
                    PC ARCHITECT
                </h1>
<p class="text-[10px] font-bold tracking-[0.2em] text-on-surface-variant uppercase opacity-60">
                    High-End Hardware Editorial
                </p>
</div>
</div>
<!-- Bottom UI Section: Loading & Progress -->
<div class="absolute bottom-20 w-full max-w-[240px] px-6 space-y-8 flex flex-col items-center">
<!-- Progress Container -->
<div class="w-full h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<!-- Active Indicator (Progress Bar) -->
<div class="h-full bg-primary w-1/3 rounded-full"></div>
</div>
<!-- Loading Status -->
<div class="flex items-center space-x-2">
<span class="text-[11px] font-bold tracking-widest text-on-surface-variant uppercase">
                    Initializing System
                </span>
<!-- Subtle Spinner Dot -->
<div class="w-1 h-1 bg-tertiary rounded-full animate-pulse"></div>
</div>
</div>
<!-- Footnote / Versioning (Architectural Metadata) -->
<div class="absolute bottom-8 text-center">
<p class="text-[9px] font-bold tracking-widest text-on-surface-variant opacity-40 uppercase">
                v4.0.0 — Precision Orchestration
            </p>
</div>
</main>
<!-- Navigation Shell Logic: Suppression applied as per rules (Splash screens hide Shell) -->
<!-- Navigation Drawer, TopAppBar, and BottomNavBar are NOT rendered on Splash Screens -->
</body></html>
